<div class="flex flex-col items-center gap-4 w-full max-w-xs">
  <button
    (click)="onCreateRoom()"
    [disabled]="isConnecting()"
    class="w-full flex justify-center items-center gap-2 py-2 px-4 bg-white/60 hover:bg-white/80 disabled:opacity-70 disabled:cursor-not-allowed rounded-xl shadow-sm transition-all backdrop-blur-sm font-medium"
  >
    @if (isConnecting()) {
      <svg
        class="animate-spin h-5 w-5 text-gray-700"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    } @else {
      Создать комнату
    }
  </button>

  <div class="flex items-center gap-2 w-full mt-2">
    <input
      #roomInput
      (input)="(null)"
      type="text"
      [disabled]="isConnecting()"
      placeholder="Код комнаты..."
      class="flex-1 py-2 px-3 bg-white/40 border border-white/50 rounded-xl outline-none focus:ring-2 focus:ring-white/80 transition-all placeholder:text-gray-500 disabled:opacity-70 disabled:cursor-not-allowed"
    />
    <button
      (click)="onJoinRoom(roomInput.value)"
      [disabled]="isConnecting() || !roomInput.value.trim()"
      class="flex justify-center items-center py-2 px-4 bg-white/60 hover:bg-white/80 disabled:opacity-70 disabled:cursor-not-allowed rounded-xl shadow-sm transition-all backdrop-blur-sm font-medium"
    >
      Войти
    </button>
  </div>
</div>
