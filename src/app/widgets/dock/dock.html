<div class="fixed bottom-4 left-1/2 -translate-x-1/2">
  <nav
    class="flex items-end gap-2 px-3 pt-2 pb-3 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl shadow-2xl"
  >
    @for (app of appsList(); track app.id) {
      <div class="group relative flex flex-col items-center">
        <span
          class="absolute -top-10 left-1/2 -translate-x-1/2 px-2 py-1 bg-gray-800/80 text-white text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none whitespace-nowrap"
        >
          {{ app.title }}
        </span>

        <button
          (click)="openApp(app.id)"
          class="relative flex flex-col items-center justify-center w-12 h-12 rounded-xl bg-linear-to-br from-white/40 to-white/10 hover:from-white/60 hover:to-white/20 transition-all duration-200 transform hover:-translate-y-1 active:scale-90 border border-white/20 shadow-sm"
        >
          <span class="text-xl font-semibold text-gray-800 select-none">
            {{ app.title.charAt(0) }}
          </span>
        </button>

        @if (openedApps().has(app.id)) {
          <div
            class="absolute -bottom-2 w-1 h-1 bg-gray-800 rounded-full shadow-sm animate-in fade-in zoom-in duration-300"
          ></div>
        }
      </div>
    }
  </nav>
</div>
